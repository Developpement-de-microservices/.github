openapi: 3.1.0
info:
  title: SAE401 Plateforme de gestion des déploiements d'applications
  version: "1.0"
  description: >-
    Projet microservices : Plateforme de gestion des déploiements dʼapplications.
    Groupe : Esteban Heschung, Florent Leclerc, Quentin Cormerais, Tristan Arnaiz.

servers:
  - url: http://localhost:8080/
    description: Proxy HTTP principal
  - url: http://localhost:5000/
    description: Accès direct au microservice Users
  - url: http://localhost:5001/
    description: Accès direct au microservice Apps
  - url: http://localhost:5002/
    description: Accès direct au microservice Environments
  - url: http://localhost:5003/
    description: Accès direct au microservice Deployments
  - url: http://localhost:5004/
    description: Accès direct au microservice Events

tags:
  - name: Auth
    description: Connexion et émission du jeton JWT.
  - name: Users
    description: Gestion des utilisateurs et des rôles.
  - name: Applications
    description: Gestion des applications et de leurs versions (Service Apps).
  - name: Environments
    description: Gestion des environnements de déploiement.
  - name: Deployments
    description: Orchestration des déploiements et du rollback.
  - name: Events
    description: Journalisation des événements liés aux déploiements.

security:
  - bearerAuth: []

paths:
  # --- AUTH ---
  /auth/login:
    post:
      tags: [Auth]
      summary: Authentifier un utilisateur et obtenir un JWT
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                value:
                  username: admin
                  password: bonjour
      responses:
        '200':
          description: Authentification réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Champs manquant
        '401':
          description: Identifiant / Mot de passe invalide
        '403':
          description: Compte désactivé

  /auth/verify:
    post:
      tags: [Auth]
      summary: Vérifier la validité d'un token
      operationId: verifyToken
      responses:
        '200':
          description: Token valide
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    examples: [true]
        '401':
          description: Token manquant ou invalide

  # --- USERS ---
  /users/health:
    get:
      tags: [Users]
      summary: Vérifier la santé de l'API Users
      operationId: getHealthUsers
      security: []
      responses:
        '200':
          description: Santé de l'API
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /users:
    get:
      tags: [Users]
      summary: Lister les utilisateurs
      operationId: listUsers
      responses:
        '200':
          description: Liste paginée des utilisateurs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUsers'
        '401':
          description: Token manquant ou invalide
    post:
      tags: [Users]
      summary: Créer un utilisateur
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: Utilisateur créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Token manquant ou invalide
        '400':
          description: Champs manquants

  /users/{userId}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      tags: [Users]
      summary: Consulter un utilisateur
      operationId: getUserById
      responses:
        '200':
          description: Utilisateur trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Token manquant ou invalide
        '404':
          description: Utilisateur non trouvé
    patch:
      tags: [Users]
      summary: Modifier un utilisateur
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Utilisateur modifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Champs non valide
        '401':
          description: Token manquant ou invalide
        '404':
          description: Utilisateur non trouvé
    delete:
      tags: [Users]
      summary: Supprimer un utilisateur
      operationId: deleteUser
      responses:
        '200':
          description: Utilisateur supprimé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResult'
        '401':
          description: Token manquant ou invalide
        '404':
          description: Utilisateur non trouvé

  # --- APPLICATIONS (Microservice Flask Port 5001) ---
  /apps/health:
    get:
      tags: [Applications]
      summary: État de santé du service Apps
      operationId: getHealthApps
      security: []
      responses:
        '200':
          description: Service opérationnel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /apps:
    get:
      tags: [Applications]
      summary: Lister les applications (Dictionnaire)
      description: Retourne un dictionnaire complet des applications indexées par leur UUID.
      responses:
        '200':
          description: Dictionnaire des applications
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/Application'
        '401':
          description: Token manquant ou invalide
    post:
      tags: [Applications]
      summary: Créer une application
      operationId: createApplication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationCreateStrict'
      responses:
        '201':
          description: Application créée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppMutationResponse'
        '401':
          description: Token manquant ou invalide
        '400':
          description: Champs non valide

  /apps/{app_id}:
    parameters:
      - name: app_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Applications]
      summary: Détails d'une application
      operationId: getApplicationById
      responses:
        '200':
          description: Succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '401':
          description: Token manquant ou invalide
        '404':
          description: Pas d'application avec cet ID
    patch:
      tags: [Applications]
      summary: Modifier une application
      operationId: updateApplication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppUpdate'
      responses:
        '200':
          description: Modification réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppMutationResponse'
        '401':
          description: Token manquant ou invalide
        '404':
          description: Non trouvé
    delete:
      tags: [Applications]
      summary: Supprimer une application et ses versions
      operationId: deleteApplication
      responses:
        '200':
          description: Suppression réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDeleteResponse'
        '401':
          description: Token manquant ou invalide
        '404':
          description: Application non trouvée

  /apps/{app_id}/versions:
    parameters:
      - name: app_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Applications]
      summary: Lister les versions d'une application (Dictionnaire)
      operationId: listApplicationVersions
      responses:
        '200':
          description: Dictionnaire des versions
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/Version'
        '401':
          description: Token manquant ou invalide
        '404':
          description: Application non trouvée
    post:
      tags: [Applications]
      summary: Ajouter une version
      operationId: createApplicationVersion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VersionCreateStrict'
      responses:
        '201':
          description: Version créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionMutationResponse'
        '401':
          description: Token manquant ou invalide
        '404':
          description: Application non trouvée

  /apps/{app_id}/versions/{version_id}:
    parameters:
      - name: app_id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: version_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Applications]
      summary: Détails d'une version
      operationId: getVersionById
      responses:
        '200':
          description: Succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Version'
        '401':
          description: Token manquant ou invalide
        '404':
          description: Application ou Version non trouvée
    patch:
      tags: [Applications]
      summary: Modifier une version
      operationId: updateVersion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VersionUpdate'
      responses:
        '200':
          description: Version modifiée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionMutationResponse'
        '401':
          description: Token manquant ou invalide
        '404':
          description: Version non trouvée
    delete:
      tags: [Applications]
      summary: Supprimer une version spécifique
      operationId: deleteVersion
      responses:
        '200':
          description: Suppression réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDeleteResponse'
        '401':
          description: Token manquant ou invalide
        '404':
          description: Version non trouvée

  # --- ENVIRONMENTS ---
  /environments/health:
    get:
      tags: [Environments]
      summary: Vérifier la santé de l'API environements
      operationId: getHealthEnv
      security: []
      responses:
        '200':
          description: Santé de l'API
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /environments:
    get:
      tags: [Environments]
      summary: Lister les environnements avec pagination
      operationId: listEnvironments
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/EnvironmentTypeFilter'
      responses:
        '200':
          description: Liste paginée des environnements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEnvironments'
        '401':
          description: Token manquant ou invalide
    post:
      tags: [Environments]
      summary: Créer un environnement
      operationId: createEnvironment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnvironmentCreate'
      responses:
        '201':
          description: Environnement créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
        '400':
          description: Name / type is required
        '401':
          description: Token manquant ou invalide

  /environments/{environmentId}:
    parameters:
      - $ref: '#/components/parameters/EnvironmentId'
    get:
      tags: [Environments]
      summary: Consulter un environnement
      operationId: getEnvironmentById
      responses:
        '200':
          description: Environnement trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
        '401':
          description: Token manquant ou invalide
    patch:
      tags: [Environments]
      summary: Modifier un environnement
      operationId: updateEnvironment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnvironmentUpdate'
      responses:
        '200':
          description: Environnement modifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
        '401':
          description: Token manquant ou invalide
    delete:
      tags: [Environments]
      summary: Supprimer un environnement
      operationId: deleteEnvironment
      responses:
        '200':
          description: Environnement supprimé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResult'
        '400':
          description: ID introuvable
        '401':
          description: Token manquant ou invalide

  # --- DEPLOYMENTS ---
  /deployments/health:
    get:
      tags: [Deployments]
      summary: Vérifier la santé de l'API déploiements
      operationId: getHealthDeployments
      security: []
      responses:
        '200':
          description: Santé de l'API
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /deployments:
    get:
      tags: [Deployments]
      summary: Lister les déploiements avec pagination
      operationId: listDeployments
      responses:
        '200':
          description: Liste paginée des déploiements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDeployments'
        '401':
          description: Token manquant ou invalide
    post:
      tags: [Deployments]
      summary: Déclencher un déploiement
      operationId: createDeployment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentCreate'
      responses:
        '201':
          description: Déploiement créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '400':
          description: Champs obligatoires manquants
        '401':
          description: Token manquant ou invalide

  /deployments/{deploymentId}:
    parameters:
      - $ref: '#/components/parameters/DeploymentId'
    get:
      tags: [Deployments]
      summary: Consulter un déploiement
      operationId: getDeploymentById
      responses:
        '200':
          description: Déploiement trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '404':
          description: Déploiement non trouvé
    patch:
      tags: [Deployments]
      summary: Mettre à jour un déploiement
      operationId: updateDeployment
      description: >-
        Utilisé pour faire évoluer l'état du déploiement, par exemple PENDING,
        RUNNING, FAILED ou DEPLOYED.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentUpdate'
      responses:
        '200':
          description: Déploiement mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '401':
          description: Token manquant ou invalide
        '404':
          description: Déploiement non trouvé

  /deployments/{deploymentId}/rollback:
    post:
      tags: [Deployments]
      summary: Lancer un rollback sur un déploiement
      operationId: rollbackDeployment
      parameters:
        - $ref: '#/components/parameters/DeploymentId'
      responses:
        '200':
          description: Rollback déclenché
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '401':
          description: Token manquant ou invalide

  /deployments/{deploymentId}/events:
    get:
      tags: [Deployments, Events]
      summary: Consulter les événements d'un déploiement
      operationId: listDeploymentEvents
      parameters:
        - $ref: '#/components/parameters/DeploymentId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Liste paginée des événements du déploiement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEvents'
        '401':
          description: Token manquant ou invalide

  # --- EVENTS ---
  /events/health:
    get:
      tags: [Events]
      summary: Vérifier la santé de l'API événements
      operationId: getHealthEvents
      security: []
      responses:
        '200':
          description: Santé de l'API
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /events:
    get:
      tags: [Events]
      summary: Lister les événements avec pagination
      operationId: listEvents
      responses:
        '200':
          description: Liste paginée des événements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEvents'
        '401':
          description: Token manquant ou invalide
    post:
      tags: [Events]
      summary: Enregistrer un événement
      operationId: createEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventCreate'
      responses:
        '201':
          description: Événement créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          description: Champ non valide
        '401':
          description: Token manquant ou invalide
        '404':
          description: Déploiement non trouvé

  /events/{eventId}:
    parameters:
      - $ref: '#/components/parameters/EventId'
    get:
      tags: [Events]
      summary: Consulter un événement
      operationId: getEventById
      responses:
        '200':
          description: Événement trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '401':
          description: Token manquant ou invalide
        '404':
          description: Evenement non trouvé

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Page:
      name: page
      in: query
      required: false
      description: Numéro de page (commence à 1)
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      description: Nombre d'éléments par page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    Search:
      name: search
      in: query
      required: false
      description: Filtre textuel libre
      schema:
        type: string
        minLength: 1
    RoleFilter:
      name: role
      in: query
      required: false
      description: Filtre par rôle utilisateur
      schema:
        $ref: '#/components/schemas/Role'
    OwnerIdFilter:
      name: ownerId
      in: query
      required: false
      description: Filtre par propriétaire d'application
      schema:
        type: string
        format: uuid
    EnvironmentTypeFilter:
      name: type
      in: query
      required: false
      description: Filtre par type d'environnement
      schema:
        $ref: '#/components/schemas/EnvironmentType'
    ApplicationIdFilter:
      name: applicationId
      in: query
      required: false
      description: Filtre par application
      schema:
        type: string
        format: uuid
    EnvironmentIdFilter:
      name: environmentId
      in: query
      required: false
      description: Filtre par environnement
      schema:
        type: string
        format: uuid
    DeploymentStatusFilter:
      name: status
      in: query
      required: false
      description: Filtre par statut de déploiement
      schema:
        $ref: '#/components/schemas/DeploymentStatus'
    DeploymentIdFilter:
      name: deploymentId
      in: query
      required: false
      description: Filtre par déploiement
      schema:
        type: string
        format: uuid
    EventTypeFilter:
      name: type
      in: query
      required: false
      description: Filtre par type d'événement
      schema:
        $ref: '#/components/schemas/EventType'
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ApplicationId:
      name: applicationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VersionId:
      name: versionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EnvironmentId:
      name: environmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DeploymentId:
      name: deploymentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EventId:
      name: eventId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      properties:
        status:
          type: string
          examples: [ok]
        service:
          type: string
          examples: [Apps]
        timestamp:
          type: string
          format: date-time
      required: [status, service, timestamp]

    LoginRequest:
      type: object
      additionalProperties: false
      properties:
        username:
          type: string
        password:
          type: string
          format: password
      required: [password, username]

    LoginResponse:
      type: object
      additionalProperties: false
      properties:
        accessToken:
          type: string
        user:
          $ref: '#/components/schemas/User'
      required: [accessToken, user]

    MutationResult:
      type: object
      additionalProperties: false
      properties:
        success:
          type: boolean
        message:
          type: string
        id:
          type: string
          format: uuid
      required: [success, message]

    Role:
      type: string
      enum: [ADMIN, USER]

    User:
      type: object
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        email: { type: string, format: email }
        role: { $ref: '#/components/schemas/Role' }
        active: { type: boolean, default: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, username, email, role, active, createdAt, updatedAt]

    UserCreate:
      type: object
      additionalProperties: false
      properties:
        username: { type: string, minLength: 3 }
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 8 }
        role: { $ref: '#/components/schemas/Role' }
        active: { type: boolean, default: true }
      required: [username, email, password]

    UserUpdate:
      type: object
      additionalProperties: false
      properties:
        username: { type: string, minLength: 3 }
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 8 }
        role: { $ref: '#/components/schemas/Role' }
        active: { type: boolean }
      minProperties: 1

    # --- APPS (Sync implementation) ---
    Application:
      type: object
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        repositoryUrl: { type: string, format: uri }
        ownerId: { type: string, format: uuid }
        latestVersion: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, createdAt, updatedAt]

    ApplicationCreateStrict:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }
        repositoryUrl: { type: string, format: uri }
        ownerId: { type: string, format: uuid }
        latestVersion: { type: string }

    AppUpdate:
      type: object
      additionalProperties: false
      properties:
        name: { type: string }
        description: { type: string }
        repositoryUrl: { type: string, format: uri }
        ownerId: { type: string, format: uuid }
        latestVersion: { type: string }

    AppMutationResponse:
      type: object
      additionalProperties: false
      properties:
        id: { type: string }
        message: { type: string }
        app: { $ref: '#/components/schemas/Application' }

    Version:
      type: object
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        applicationId: { type: string, format: uuid }
        status: { type: string }
        version: { type: string }
        changelog: { type: string }
        versionUrl: { type: string, format: uri }
        ownerId: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, applicationId, version, status, createdAt, updatedAt]

    VersionCreateStrict:
      type: object
      additionalProperties: false
      required: [version]
      properties:
        version: { type: string }
        status: { type: string, default: "DRAFT" }
        changelog: { type: string }
        versionUrl: { type: string, format: uri }
        ownerId: { type: string }

    VersionUpdate:
      type: object
      additionalProperties: false
      properties:
        status: { type: string }
        version: { type: string }
        changelog: { type: string }
        versionUrl: { type: string, format: uri }
        ownerId: { type: string }

    VersionMutationResponse:
      type: object
      additionalProperties: false
      properties:
        id: { type: string }
        applicationId: { type: string }
        message: { type: string }
        version: { $ref: '#/components/schemas/Version' }

    GenericDeleteResponse:
      type: object
      additionalProperties: false
      properties:
        id: { type: string }
        message: { type: string }

    # --- ENVIRONMENTS ---
    EnvironmentType:
      type: string
      enum: [development, staging, production]

    Environment:
      type: object
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        type: { $ref: '#/components/schemas/EnvironmentType' }
        description: { type: string }
        url: { type: string, format: uri }
        active: { type: boolean, default: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, type, active, createdAt, updatedAt]

    EnvironmentCreate:
      type: object
      additionalProperties: false
      properties:
        name: { type: string }
        type: { $ref: '#/components/schemas/EnvironmentType' }
        description: { type: string }
        url: { type: string, format: uri }
        active: { type: boolean, default: true }
      required: [name, type]

    EnvironmentUpdate:
      type: object
      additionalProperties: false
      properties:
        name: { type: string }
        type: { $ref: '#/components/schemas/EnvironmentType' }
        description: { type: string }
        url: { type: string, format: uri }
        active: { type: boolean }
      minProperties: 1

    # --- DEPLOYMENTS ---
    DeploymentStatus:
      type: string
      enum: [PENDING, RUNNING, FAILED, DEPLOYED]

    Deployment:
      type: object
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        applicationId: { type: string, format: uuid }
        versionId: { type: string, format: uuid }
        environmentId: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/DeploymentStatus' }
        initiatedBy: { type: string, format: uuid }
        notes: { type: string }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, applicationId, versionId, environmentId, status, createdAt, updatedAt]

    DeploymentCreate:
      type: object
      additionalProperties: false
      properties:
        applicationId: { type: string, format: uuid }
        versionId: { type: string, format: uuid }
        environmentId: { type: string, format: uuid }
        notes: { type: string }
      required: [applicationId, versionId, environmentId]

    DeploymentUpdate:
      type: object
      additionalProperties: false
      properties:
        status: { $ref: '#/components/schemas/DeploymentStatus' }
        notes: { type: string }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time }
      minProperties: 1

    # --- EVENTS ---
    EventType:
      type: string
      enum: [DEPLOYMENT_STARTED, DEPLOYMENT_FINISHED, DEPLOYMENT_ERROR, ROLLBACK]

    Event:
      type: object
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        deploymentId: { type: string, format: uuid }
        type: { $ref: '#/components/schemas/EventType' }
        message: { type: string }
        data: { type: object, additionalProperties: true }
        initiatedBy: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
      required: [id, deploymentId, type, message, createdAt]

    EventCreate:
      type: object
      additionalProperties: false
      properties:
        deploymentId: { type: string, format: uuid }
        type: { $ref: '#/components/schemas/EventType' }
        message: { type: string }
        data: { type: object, additionalProperties: true }
        initiatedBy: { type: string, format: uuid }
      required: [deploymentId, type, message]

    # --- PAGINATION ---
    PaginatedMeta:
      type: object
      additionalProperties: false
      properties:
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1 }
        totalItems: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
        hasNext: { type: boolean }
        hasPrevious: { type: boolean }
      required: [page, pageSize, totalItems, totalPages, hasNext, hasPrevious]

    PaginatedUsers:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/User' } }
        meta: { $ref: '#/components/schemas/PaginatedMeta' }
      required: [items, meta]

    PaginatedEnvironments:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Environment' } }
        meta: { $ref: '#/components/schemas/PaginatedMeta' }
      required: [items, meta]

    PaginatedDeployments:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Deployment' } }
        meta: { $ref: '#/components/schemas/PaginatedMeta' }
      required: [items, meta]

    PaginatedEvents:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Event' } }
        meta: { $ref: '#/components/schemas/PaginatedMeta' }
      required: [items, meta]
