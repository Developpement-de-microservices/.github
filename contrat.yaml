openapi: 3.1.0
info:
  title: SAE401 Plateforme de gestion des déploiements d'applications
  version: 1.0.0
  description: >-
    Projet microservices : Plateforme de gestion des déploiements dʼapplications.
    Groupe : 
    Esteban Heschung
    Florent Leclerc
    Quentin Cormerais
    Tristan Arnaiz

servers:
  - url: http://localhost:8080/
    description: Proxy HTTP principal

tags:
  - name: Health
    description: Vérification de disponibilité et de santé des services.
  - name: Auth
    description: Connexion et émission du jeton JWT.
  - name: Users
    description: Gestion des utilisateurs et des rôles.
  - name: Applications
    description: Gestion des applications et de leurs versions.
  - name: Environments
    description: Gestion des environnements de déploiement.
  - name: Deployments
    description: Orchestration des déploiements et du rollback.
  - name: Events
    description: Journalisation des événements liés aux déploiements.

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [Health]
      summary: Vérifier la santé de l'API
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Santé de l'API
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Authentifier un utilisateur et obtenir un JWT
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                value:
                  username: admin
                  password: bonjour
      responses:
        '200':
          description: Authentification réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Champs manquant
        '401':
          description: Identifiants / mot de passe invalide
        '403':
          description: Compte désactivé
      
  /auth/verify:
    post:
      tags: [Auth]
      summary: Vérifier la validité d'un token
      operationId: verifyToken
      security: []
      responses:
        '200':
          description: Token valide
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    examples: [true]
        '401':
          description: Token manquant ou invalide


  /users:
    get:
      tags: [Users]
      summary: Lister les utilisateurs
      operationId: listUsers
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/RoleFilter'
      responses:
        '200':
          description: Liste paginée des utilisateurs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUsers'
    post:
      tags: [Users]
      summary: Créer un utilisateur
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: Utilisateur créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Champs manquants

  /users/{userId}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      tags: [Users]
      summary: Consulter un utilisateur
      operationId: getUserById
      responses:
        '200':
          description: Utilisateur trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Utilisateur non trouvé

    patch:
      tags: [Users]
      summary: Modifier un utilisateur
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Utilisateur modifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    delete:
      tags: [Users]
      summary: Supprimer un utilisateur
      operationId: deleteUser
      responses:
        '200':
          description: Utilisateur supprimé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResult'
        '404':
         description: Utilisateur non trouvé

  /applications:
    get:
      tags: [Applications]
      summary: Lister les applications avec pagination
      operationId: listApplications
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/OwnerIdFilter'
      responses:
        '200':
          description: Liste paginée des applications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedApplications'
    post:
      tags: [Applications]
      summary: Créer une application
      operationId: createApplication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationCreate'
      responses:
        '201':
          description: Application créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'

  /applications/{applicationId}:
    parameters:
      - $ref: '#/components/parameters/ApplicationId'
    get:
      tags: [Applications]
      summary: Consulter une application
      operationId: getApplicationById
      responses:
        '200':
          description: Application trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
    patch:
      tags: [Applications]
      summary: Modifier une application
      operationId: updateApplication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationUpdate'
      responses:
        '200':
          description: Application modifiée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
    delete:
      tags: [Applications]
      summary: Supprimer une application
      operationId: deleteApplication
      responses:
        '200':
          description: Application supprimée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResult'

  /applications/{applicationId}/versions:
    parameters:
      - $ref: '#/components/parameters/ApplicationId'
    get:
      tags: [Applications]
      summary: Lister les versions d'une application avec pagination
      operationId: listApplicationVersions
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Liste paginée des versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedVersions'
    post:
      tags: [Applications]
      summary: Créer une version pour une application
      operationId: createApplicationVersion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VersionCreate'
      responses:
        '201':
          description: Version créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Version'

  /applications/{applicationId}/versions/{versionId}:
    parameters:
      - $ref: '#/components/parameters/ApplicationId'
      - $ref: '#/components/parameters/VersionId'
    get:
      tags: [Applications]
      summary: Consulter une version
      operationId: getVersionById
      responses:
        '200':
          description: Version trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Version'
    patch:
      tags: [Applications]
      summary: Modifier une version
      operationId: updateVersion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VersionUpdate'
      responses:
        '200':
          description: Version modifiée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Version'
    delete:
      tags: [Applications]
      summary: Supprimer une version
      operationId: deleteVersion
      responses:
        '200':
          description: Version supprimée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResult'

  /environments:
    get:
      tags: [Environments]
      summary: Lister les environnements avec pagination
      operationId: listEnvironments
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/EnvironmentTypeFilter'
      responses:
        '200':
          description: Liste paginée des environnements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEnvironments'
    post:
      tags: [Environments]
      summary: Créer un environnement
      operationId: createEnvironment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnvironmentCreate'
      responses:
        '201':
          description: Environnement créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'

  /environments/{environmentId}:
    parameters:
      - $ref: '#/components/parameters/EnvironmentId'
    get:
      tags: [Environments]
      summary: Consulter un environnement
      operationId: getEnvironmentById
      responses:
        '200':
          description: Environnement trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
    patch:
      tags: [Environments]
      summary: Modifier un environnement
      operationId: updateEnvironment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnvironmentUpdate'
      responses:
        '200':
          description: Environnement modifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
    delete:
      tags: [Environments]
      summary: Supprimer un environnement
      operationId: deleteEnvironment
      responses:
        '200':
          description: Environnement supprimé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResult'

  /deployments:
    get:
      tags: [Deployments]
      summary: Lister les déploiements avec pagination
      operationId: listDeployments
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/ApplicationIdFilter'
        - $ref: '#/components/parameters/EnvironmentIdFilter'
        - $ref: '#/components/parameters/DeploymentStatusFilter'
      responses:
        '200':
          description: Liste paginée des déploiements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDeployments'
    post:
      tags: [Deployments]
      summary: Déclencher un déploiement
      operationId: createDeployment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentCreate'
      responses:
        '201':
          description: Déploiement créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'

  /deployments/{deploymentId}:
    parameters:
      - $ref: '#/components/parameters/DeploymentId'
    get:
      tags: [Deployments]
      summary: Consulter un déploiement
      operationId: getDeploymentById
      responses:
        '200':
          description: Déploiement trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
    patch:
      tags: [Deployments]
      summary: Mettre à jour un déploiement
      operationId: updateDeployment
      description: >-
        Utilisé pour faire évoluer l'état du déploiement, par exemple PENDING,
        RUNNING, FAILED ou DEPLOYED.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentUpdate'
      responses:
        '200':
          description: Déploiement mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'

  /deployments/{deploymentId}/rollback:
    post:
      tags: [Deployments]
      summary: Lancer un rollback sur un déploiement
      operationId: rollbackDeployment
      parameters:
        - $ref: '#/components/parameters/DeploymentId'
      responses:
        '200':
          description: Rollback déclenché
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'

  /deployments/{deploymentId}/events:
    get:
      tags: [Deployments, Events]
      summary: Consulter les événements d'un déploiement
      operationId: listDeploymentEvents
      parameters:
        - $ref: '#/components/parameters/DeploymentId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Liste paginée des événements du déploiement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEvents'

  /events:
    get:
      tags: [Events]
      summary: Lister les événements avec pagination
      operationId: listEvents
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/DeploymentIdFilter'
        - $ref: '#/components/parameters/EventTypeFilter'
      responses:
        '200':
          description: Liste paginée des événements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEvents'
    post:
      tags: [Events]
      summary: Enregistrer un événement
      operationId: createEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventCreate'
      responses:
        '201':
          description: Événement créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          description: Champ non valide

  /events/{eventId}:
    parameters:
      - $ref: '#/components/parameters/EventId'
    get:
      tags: [Events]
      summary: Consulter un événement
      operationId: getEventById
      responses:
        '200':
          description: Événement trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '404':
          description: Element non trouvé

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Page:
      name: page
      in: query
      required: false
      description: Numéro de page (commence à 1)
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      description: Nombre d'éléments par page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    Search:
      name: search
      in: query
      required: false
      description: Filtre textuel libre
      schema:
        type: string
        minLength: 1
    RoleFilter:
      name: role
      in: query
      required: false
      description: Filtre par rôle utilisateur
      schema:
        $ref: '#/components/schemas/Role'
    OwnerIdFilter:
      name: ownerId
      in: query
      required: false
      description: Filtre par propriétaire d'application
      schema:
        type: string
        format: uuid
    EnvironmentTypeFilter:
      name: type
      in: query
      required: false
      description: Filtre par type d'environnement
      schema:
        $ref: '#/components/schemas/EnvironmentType'
    ApplicationIdFilter:
      name: applicationId
      in: query
      required: false
      description: Filtre par application
      schema:
        type: string
        format: uuid
    EnvironmentIdFilter:
      name: environmentId
      in: query
      required: false
      description: Filtre par environnement
      schema:
        type: string
        format: uuid
    DeploymentStatusFilter:
      name: status
      in: query
      required: false
      description: Filtre par statut de déploiement
      schema:
        $ref: '#/components/schemas/DeploymentStatus'
    DeploymentIdFilter:
      name: deploymentId
      in: query
      required: false
      description: Filtre par déploiement
      schema:
        type: string
        format: uuid
    EventTypeFilter:
      name: type
      in: query
      required: false
      description: Filtre par type d'événement
      schema:
        $ref: '#/components/schemas/EventType'
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ApplicationId:
      name: applicationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VersionId:
      name: versionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EnvironmentId:
      name: environmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DeploymentId:
      name: deploymentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EventId:
      name: eventId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      properties:
        status:
          type: string
          examples: [ok]
        service:
          type: string
          examples: [Auth]
        version:
          type: string
          examples: [1.0.0]
        timestamp:
          type: string
          format: date-time
      required: [status, service, version, timestamp]

    LoginRequest:
      type: object
      additionalProperties: false
      properties:
        username:
          type: string
          examples: [admin]
        password:
          type: string
          format: password
          minLength: 1
      required: [password, username]

    LoginResponse:
      type: object
      additionalProperties: false
      properties:
        accessToken:
          type: string
          description: "Jeton JWT à utiliser dans Authorization: Bearer"
        user:
          $ref: '#/components/schemas/User'
      required: [accessToken, user]

    MutationResult:
      type: object
      additionalProperties: false
      properties:
        success:
          type: boolean
        message:
          type: string
          examples: [Ressource supprimée avec succès]
        id:
          type: string
          format: uuid
      required: [success, message]

    Role:
      type: string
      enum: [ADMIN, USER]

    User:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
          examples: [jean]
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'
        active:
          type: boolean
          default: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, username, email, role, active, createdAt, updatedAt]

    UserCreate:
      type: object
      additionalProperties: false
      properties:
        username:
          type: string
          examples: [bob]
          minLength: 3
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        role:
          $ref: '#/components/schemas/Role'
        active:
          type: boolean
          default: true
      required: [username, email, password]

    UserUpdate:
      type: object
      additionalProperties: false
      properties:
        username:
          type: string
          examples: [jean]
          minLength: 3
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        role:
          $ref: '#/components/schemas/Role'
        active:
          type: boolean
      minProperties: 1

    Application:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          examples: [appId]
          format: uuid
        name:
          type: string
          examples: [The best app]
        description:
          examples: [Une bonne app.]
          type: string
          
        repositoryUrl:
          type: string
          format: uri
          
        ownerId:
          type: string
          format: uuid
          
        latestVersion:
          type: string
          examples: [1.2.3]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, createdAt, updatedAt]

    ApplicationCreate:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          examples: [appName]
          minLength: 2
        description:
          examples: [The best app.]
          type: string
          
        repositoryUrl:
          type: string
          format: uri
          
        ownerId:
          type: string
          format: uuid
          
      required: [name]

    ApplicationUpdate:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          examples: [Une app terrible]
          minLength: 2
        description:
          type: string
          
        repositoryUrl:
          type: string
          examples: [La description terrible.]
          format: uri
          
        ownerId:
          type: string
          format: uuid
          
      minProperties: 1

    Version:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        applicationId:
          type: string
          format: uuid
        version:
          type: string
          examples: [1.0.0]
        changelog:
          examples: ["Ajout d'un event."]
          type: string
          
        versionUrl:
          type: string
          format: uri
          
        status:
          type: string
          enum: [DRAFT, RELEASED, ARCHIVED]
          examples: [RELEASED]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, applicationId, version, status, createdAt, updatedAt]

    VersionCreate:
      type: object
      additionalProperties: false
      properties:
        version:
          type: string
          examples: [1.0.0]
        changelog:
          examples: [Update !]
          type: string
          
        versionUrl:
          type: string
          format: uri
          
        status:
          type: string
          enum: [DRAFT, RELEASED, ARCHIVED]
          default: DRAFT
      required: [version]

    VersionUpdate:
      type: object
      additionalProperties: false
      properties:
        version:
          type: string
          examples: [1.1.1]
        changelog:
          examples: [Version update]
          type: string
          
        artifactUrl:
          type: string
          format: uri
          
        status:
          type: string
          enum: [DRAFT, RELEASED, ARCHIVED]
      minProperties: 1

    EnvironmentType:
      type: string
      enum: [development, staging, production]

    Environment:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          examples: [staging-eu-west]
        type:
          $ref: '#/components/schemas/EnvironmentType'
        description:
          examples: [Good description about environments !]
          type: string
          
        url:
          type: string
          format: uri
          
        active:
          type: boolean
          default: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, type, active, createdAt, updatedAt]

    EnvironmentCreate:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          examples: [Environnement génial]
        type:
          $ref: '#/components/schemas/EnvironmentType'
        description:
          examples: [Environnement très bien.]
          type: string
          
        url:
          type: string
          format: uri
          
        active:
          type: boolean
          default: true
      required: [name, type]

    EnvironmentUpdate:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          examples: [Update environnement]
        type:
          $ref: '#/components/schemas/EnvironmentType'
        description:
          type: string
          examples: [Environnement changé]
          
        url:
          type: string
          format: uri
          
        active:
          type: boolean
      minProperties: 1

    DeploymentStatus:
      type: string
      enum: [PENDING, RUNNING, FAILED, DEPLOYED]

    Deployment:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        applicationId:
          type: string
          format: uuid
